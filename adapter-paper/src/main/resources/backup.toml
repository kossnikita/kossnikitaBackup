repository = "user@backup:/backups/minecraft_repo"
paths = ["./world", "./plugins"]
exclude = ["logs/**", "crash-reports/**", "cache/**", "*.tmp", "session.lock"]
compression = "lz4"
archive_prefix = "paper"
working_directory = "."
timeout = "2h"

[schedule]
interval = "3h"
run_on_startup = false
# cron = "0 */3 * * *"

[retention]
keep_last = 16
compact = false

[environment]
# BORG_RSH = "ssh -i ~/.ssh/id_ed25519"
# BORG_EXECUTABLE = "./tools/borg/borg"
# BORG_DOWNLOAD_URL = "https://github.com/borgbackup/borg/releases/download/1.4.4/borg-linux-glibc231-x86_64"
# BORG_DOWNLOAD_SHA256 = "<sha256>"

[environment_files]
BORG_PASSPHRASE = "secrets/borg_passphrase.secret"

[retry]
enabled = true
max_attempts = 2
delay = "5m"

[hooks]
pre = []
post = []
timeout = "10m"

[webhook]
enabled = false
url = ""
token = ""
timeout = "10s"
