repository = "s3:https://garage.internal:3900/minecraft-backups"
paths = ["./world", "./mods"]
exclude = ["logs/**", "crash-reports/**", "cache/**", "*.tmp", "session.lock"]
compression = "auto"
archive_prefix = "fabric"
working_directory = "."
timeout = "2h"

[schedule]
interval = "3h"
# cron = "0 */3 * * *"

[retention]
keep_last = 16
compact = false

[environment]
AWS_ACCESS_KEY_ID = "garage-access-key"
AWS_SECRET_ACCESS_KEY = "garage-secret-key"
AWS_REGION = "garage"
AWS_ENDPOINT_URL = "https://garage.internal:3900"

[environment_files]
RESTIC_PASSWORD = "secrets/restic_password.secret"

[retry]
enabled = true
max_attempts = 2
delay = "5m"

[hooks]
pre = []
post = []
timeout = "10m"

[webhook]
enabled = false
url = ""
token = ""
timeout = "10s"
