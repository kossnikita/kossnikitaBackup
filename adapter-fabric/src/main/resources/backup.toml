repository = "user@backup:/backups/minecraft_repo"
paths = ["./world", "./mods"]
exclude = ["logs/**", "crash-reports/**", "cache/**", "*.tmp", "session.lock"]
compression = "lz4"
archive_prefix = "fabric"
working_directory = "."
timeout = "2h"

[schedule]
interval = "3h"
# cron = "0 */3 * * *"

[retention]
keep_last = 16
compact = false

[environment]

[environment_files]
BORG_PASSPHRASE = "secrets/borg_passphrase.secret"

[retry]
enabled = true
max_attempts = 2
delay = "5m"

[hooks]
pre = []
post = []
timeout = "10m"

[webhook]
enabled = false
url = ""
token = ""
timeout = "10s"
