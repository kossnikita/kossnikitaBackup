name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Setup JDK 21 (Gradle runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup JDK 25 (toolchain)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        shell: bash
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew --no-daemon test -Dorg.gradle.java.installations.paths="$JAVA_HOME_25_X64"

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Setup JDK 21 (Gradle runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup JDK 25 (toolchain)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build project
        shell: bash
        run: |
          export JAVA_HOME="$JAVA_HOME_21_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew --no-daemon clean build -x test -Dorg.gradle.java.installations.paths="$JAVA_HOME_25_X64"

      - name: Upload distributable jars
        uses: actions/upload-artifact@v6
        with:
          name: minecraft-borg-backup-jars
          path: |
            core/build/libs/*.jar
            adapter-paper/build/libs/*.jar
            adapter-fabric/build/libs/*.jar
          if-no-files-found: error
